name: User App CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/user-app-v2/**'
  pull_request:
    branches: [main]
    paths:
      - 'apps/user-app-v2/**'

defaults:
  run:
    working-directory: apps/user-app-v2

jobs:
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/user-app-v2/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

  android-build:
    name: Android Debug Build
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/user-app-v2/package-lock.json

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm ci

      - name: Create .env
        run: cp .env.example .env

      - name: Build Android debug APK
        working-directory: apps/user-app-v2/android
        run: ./gradlew assembleDebug --no-daemon
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: apps/user-app-v2/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
