# Fly.io config for the NestJS API (services/api).
# Run `fly deploy` from the repo root (this directory) so the Docker build
# context is the whole pnpm workspace.

app = "project1-api"          # change to your app name (must match `fly apps create`)
primary_region = "bom"        # Mumbai — co-locate with your Postgres/Redis & users

[build]
  dockerfile = "Dockerfile"

# Runs in a temporary machine on every deploy, BEFORE the new release goes live.
# Applies pending Prisma migrations. Requires DATABASE_URL to be set as a secret.
[deploy]
  release_command = "node_modules/.bin/prisma migrate deploy"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  API_PREFIX = "api"
  # CORS in main.ts is INVERTED + misspelled: it's applied only when CORS_ENALED
  # is NOT "true". Do NOT set CORS_ENALED=true (that disables CORS). Instead set
  # CORS_ORIGINS to a comma-separated allowlist (empty = allow all).
  CORS_ORIGINS = "https://your-web-app.fly.dev"

[http_service]
  internal_port = 3000
  force_https = true
  # CRITICAL: your BullMQ workers + daily cron run IN-PROCESS. The machine must
  # stay alive — do NOT let Fly scale it to zero, or jobs/cron silently stop.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

  # Terminus health endpoint is at /<API_PREFIX>/health -> /api/health
  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/api/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"              # NestJS + Prisma + BullMQ; bump to 2gb if you see OOM
