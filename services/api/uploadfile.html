<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>S3 Presigned PDF Upload</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 480px;
        margin: 40px auto;
      }
      input,
      button {
        display: block;
        margin-top: 12px;
      }
      button {
        padding: 8px 12px;
        cursor: pointer;
      }
      .status {
        margin-top: 16px;
        font-size: 14px;
      }
    </style>
  </head>

  <body>
    <h2>Upload PDF to S3</h2>

    <input type="file" id="fileInput" accept="application/pdf" />
    <button id="uploadBtn">Upload</button>

    <div class="status" id="status"></div>

    <script>
      const uploadBtn = document.getElementById('uploadBtn');
      const fileInput = document.getElementById('fileInput');
      const statusEl = document.getElementById('status');

      uploadBtn.addEventListener('click', async () => {
        const file = fileInput.files[0];

        if (!file) {
          statusEl.textContent = 'Please select a PDF file.';
          return;
        }

        try {
          statusEl.textContent = 'Fetching presigned URL...';

          // 1. Call your backend to get presigned URL
          const presignedResponse = await fetch(
            'http://localhost:3000/api/internal/files/presigned-url',
            {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
              },
              body: JSON.stringify({
                fileName: file.name,
                mimeType: file.type,
                fileSize: file.size,
              }),
            },
          );

          const json = await presignedResponse.json();

          const { uploadUrl, fileKey, headers } = json.data;

          statusEl.textContent = 'Uploading to S3...';

          // 2. Upload file directly to S3
          const uploadResponse = await fetch(uploadUrl, {
            method: 'PUT',
            headers: {
              ...headers,
              'Content-Type': file.type,
            },
            body: file,
          });

          if (!uploadResponse.ok) {
            throw new Error('Upload failed');
          }

          statusEl.textContent = `Upload successful 🎉
File key: ${fileKey}`;
        } catch (error) {
          console.error(error);
          statusEl.textContent = 'Upload failed. Check console.';
        }
      });
    </script>
  </body>
</html>
