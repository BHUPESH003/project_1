# Co-tenant Nginx server block for the API subdomain.
#
# This is a NAME-BASED virtual host: it only matches api.yourdomain.com and
# leaves your existing app's config completely untouched. Do NOT remove the
# default site or any other server block.
#
# Install on the server:
#   sudo cp deploy/nginx-api.conf /etc/nginx/sites-available/api.yourdomain.com
#   sudo ln -s /etc/nginx/sites-available/api.yourdomain.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then add TLS (coexists with your other certs):
#   sudo certbot --nginx -d api.yourdomain.com
# Certbot will rewrite this file to add the :443 block and an http->https redirect.

server {
    listen 80;
    server_name api.shriradheyfarms.in;   # <-- change to your real subdomain

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 90s;
        proxy_connect_timeout 90s;
        proxy_send_timeout 90s;
    }
}
