<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Cancel Confirmation Modal</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0d59f2",
                        "background-light": "#f5f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display">
<!-- Main Container representing the app background behind the modal -->
<div class="relative flex min-h-screen w-full flex-col overflow-hidden">
<!-- Mock App Content to show context behind the blur -->
<div aria-hidden="true" class="flex-1 p-4 space-y-4 opacity-30 pointer-events-none">
<div class="h-14 w-full bg-slate-200 dark:bg-slate-800 rounded-lg"></div>
<div class="h-40 w-full bg-slate-200 dark:bg-slate-800 rounded-lg"></div>
<div class="h-20 w-full bg-slate-200 dark:bg-slate-800 rounded-lg"></div>
<div class="h-14 w-full bg-slate-200 dark:bg-slate-800 rounded-lg"></div>
<div class="h-64 w-full bg-slate-200 dark:bg-slate-800 rounded-lg"></div>
</div>
<!-- Overlay / Backdrop -->
<div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm transition-opacity">
<!-- Modal Card -->
<div class="w-full max-w-[320px] transform overflow-hidden rounded-xl bg-white dark:bg-[#1e293b] p-6 text-left shadow-xl transition-all border border-slate-200 dark:border-slate-700">
<!-- Header / Title -->
<div class="flex flex-col gap-2 mb-6 text-center">
<h3 class="text-lg font-bold leading-6 text-slate-900 dark:text-white" id="modal-title">
                        Cancel Order
                    </h3>
<p class="text-sm text-slate-500 dark:text-slate-400">
                        Are you sure you want to cancel this order?
                    </p>
</div>
<!-- Action Buttons -->
<div class="flex flex-col gap-3">
<!-- Primary Action (Keep Order) - Visual prominence for the 'safe' action -->
<button class="inline-flex w-full justify-center rounded-lg bg-primary px-3 py-3 text-sm font-semibold text-white shadow-sm hover:bg-primary/90 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary transition-colors" type="button">
                        No, Continue Order
                    </button>
<!-- Secondary Action (Cancel Order) - Ghost style to reduce accidental clicks -->
<button class="inline-flex w-full justify-center rounded-lg bg-transparent px-3 py-3 text-sm font-medium text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors" type="button">
                        Yes, Cancel
                    </button>
</div>
</div>
</div>
</div>
</body></html>
