<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Manual Location Entry</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0d59f2",
                        "background-light": "#f5f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-white overflow-x-hidden transition-colors duration-200">
<div class="relative flex h-full min-h-screen w-full flex-col max-w-md mx-auto bg-background-light dark:bg-background-dark">
<!-- Header -->
<header class="flex items-center justify-between p-4 sticky top-0 z-10 bg-background-light/95 dark:bg-background-dark/95 backdrop-blur-sm">
<button class="flex size-10 items-center justify-center rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors group">
<span class="material-symbols-outlined text-slate-900 dark:text-white group-hover:-translate-x-0.5 transition-transform" style="font-size: 24px;">arrow_back_ios_new</span>
</button>
<h1 class="text-lg font-bold leading-tight tracking-tight text-center flex-1 pr-10">Set Delivery Location</h1>
</header>
<!-- Search Bar -->
<div class="px-4 pb-2">
<label class="flex flex-col h-12 w-full group">
<div class="flex w-full flex-1 items-center rounded-xl bg-white dark:bg-slate-800 shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden focus-within:ring-2 focus-within:ring-primary focus-within:border-primary transition-all">
<div class="flex items-center justify-center pl-4 pr-2 text-slate-400 dark:text-slate-500">
<span class="material-symbols-outlined" style="font-size: 24px;">search</span>
</div>
<input autofocus="" class="flex w-full flex-1 bg-transparent border-none focus:ring-0 text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-slate-500 h-full text-base font-normal px-2 caret-primary" placeholder="Search for area, street name..." type="text"/>
</div>
</label>
</div>
<!-- Use Current Location -->
<div class="px-4 py-2 mt-2">
<button class="flex items-center w-full gap-4 p-3 rounded-xl bg-white dark:bg-slate-800 shadow-sm border border-transparent hover:border-primary/20 active:bg-slate-50 dark:active:bg-slate-700 transition-all group">
<div class="flex items-center justify-center rounded-lg bg-primary/10 text-primary shrink-0 size-10 group-hover:bg-primary group-hover:text-white transition-colors">
<span class="material-symbols-outlined" style="font-size: 22px;">my_location</span>
</div>
<div class="flex flex-col items-start flex-1">
<span class="text-primary font-medium text-base leading-normal">Use current location</span>
<span class="text-slate-500 dark:text-slate-400 text-xs leading-tight">Using GPS</span>
</div>
<span class="material-symbols-outlined text-slate-400" style="font-size: 20px;">chevron_right</span>
</button>
</div>
<!-- Recent Locations -->
<div class="mt-4">
<h3 class="px-6 py-2 text-xs font-bold tracking-wider text-slate-500 dark:text-slate-400 uppercase">Recent Locations</h3>
<div class="flex flex-col px-4 gap-2">
<!-- Recent Item 1: Home -->
<button class="flex items-center gap-4 w-full p-3 rounded-xl hover:bg-white dark:hover:bg-slate-800 transition-colors text-left group">
<div class="flex items-center justify-center rounded-full bg-slate-200 dark:bg-slate-700 text-slate-600 dark:text-slate-300 shrink-0 size-10 group-hover:bg-primary/10 group-hover:text-primary transition-colors">
<span class="material-symbols-outlined" style="font-size: 20px;">home</span>
</div>
<div class="flex flex-col justify-center flex-1 min-w-0">
<p class="text-slate-900 dark:text-white text-base font-medium leading-normal truncate">Home</p>
<p class="text-slate-500 dark:text-slate-400 text-sm font-normal leading-normal truncate">12th Main, Indiranagar, Bangalore</p>
</div>
</button>
<!-- Recent Item 2: Work -->
<button class="flex items-center gap-4 w-full p-3 rounded-xl hover:bg-white dark:hover:bg-slate-800 transition-colors text-left group">
<div class="flex items-center justify-center rounded-full bg-slate-200 dark:bg-slate-700 text-slate-600 dark:text-slate-300 shrink-0 size-10 group-hover:bg-primary/10 group-hover:text-primary transition-colors">
<span class="material-symbols-outlined" style="font-size: 20px;">work</span>
</div>
<div class="flex flex-col justify-center flex-1 min-w-0">
<p class="text-slate-900 dark:text-white text-base font-medium leading-normal truncate">Work</p>
<p class="text-slate-500 dark:text-slate-400 text-sm font-normal leading-normal truncate">Cyber City, DLF Phase 2, Gurugram</p>
</div>
</button>
</div>
</div>
<!-- Popular Areas -->
<div class="mt-4 pb-8">
<h3 class="px-6 py-2 text-xs font-bold tracking-wider text-slate-500 dark:text-slate-400 uppercase">Popular Areas in Bangalore</h3>
<div class="flex flex-col px-4 gap-1">
<!-- Popular Item 1 -->
<button class="flex items-center gap-4 w-full p-3 border-b border-slate-200/50 dark:border-slate-800 last:border-0 hover:bg-white dark:hover:bg-slate-800 transition-colors text-left rounded-lg group">
<div class="flex items-center justify-center rounded-full bg-slate-100 dark:bg-slate-800 text-slate-400 dark:text-slate-500 shrink-0 size-8 group-hover:text-primary transition-colors">
<span class="material-symbols-outlined" style="font-size: 20px;">location_on</span>
</div>
<div class="flex flex-col justify-center flex-1 min-w-0">
<p class="text-slate-900 dark:text-white text-base font-normal leading-normal">Koramangala</p>
<p class="text-slate-500 dark:text-slate-400 text-sm font-normal leading-normal truncate">South East Bangalore</p>
</div>
</button>
<!-- Popular Item 2 -->
<button class="flex items-center gap-4 w-full p-3 border-b border-slate-200/50 dark:border-slate-800 last:border-0 hover:bg-white dark:hover:bg-slate-800 transition-colors text-left rounded-lg group">
<div class="flex items-center justify-center rounded-full bg-slate-100 dark:bg-slate-800 text-slate-400 dark:text-slate-500 shrink-0 size-8 group-hover:text-primary transition-colors">
<span class="material-symbols-outlined" style="font-size: 20px;">location_on</span>
</div>
<div class="flex flex-col justify-center flex-1 min-w-0">
<p class="text-slate-900 dark:text-white text-base font-normal leading-normal">Connaught Place</p>
<p class="text-slate-500 dark:text-slate-400 text-sm font-normal leading-normal truncate">Central Delhi</p>
</div>
</button>
<!-- Popular Item 3 -->
<button class="flex items-center gap-4 w-full p-3 border-b border-slate-200/50 dark:border-slate-800 last:border-0 hover:bg-white dark:hover:bg-slate-800 transition-colors text-left rounded-lg group">
<div class="flex items-center justify-center rounded-full bg-slate-100 dark:bg-slate-800 text-slate-400 dark:text-slate-500 shrink-0 size-8 group-hover:text-primary transition-colors">
<span class="material-symbols-outlined" style="font-size: 20px;">location_on</span>
</div>
<div class="flex flex-col justify-center flex-1 min-w-0">
<p class="text-slate-900 dark:text-white text-base font-normal leading-normal">Bandra West</p>
<p class="text-slate-500 dark:text-slate-400 text-sm font-normal leading-normal truncate">Mumbai Suburban</p>
</div>
</button>
</div>
</div>
</div>
</body></html>
