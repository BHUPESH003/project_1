<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>New Print Order</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0d59f2",
                        "background-light": "#f5f6f8",
                        "background-dark": "#101622",
                        "surface-light": "#ffffff",
                        "surface-dark": "#1a2233",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
        /* Custom scrollbar hiding for clean UI */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-white transition-colors duration-200">
<div class="relative flex h-full min-h-screen w-full flex-col max-w-md mx-auto overflow-hidden bg-background-light dark:bg-background-dark shadow-2xl">
<!-- Header -->
<header class="flex items-center justify-between px-4 pt-6 pb-2 bg-surface-light dark:bg-background-dark sticky top-0 z-10">
<button class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-surface-dark transition-colors">
<span class="material-symbols-outlined text-slate-900 dark:text-white" style="font-size: 24px;">close</span>
</button>
<h1 class="text-lg font-bold leading-tight tracking-tight">New Print Order</h1>
<div class="w-10"></div> <!-- Spacer for balance -->
</header>
<!-- Main Content Scroll Area -->
<main class="flex-1 overflow-y-auto no-scrollbar pb-24 px-4 pt-2">
<!-- Upload Zone -->
<div class="mt-4 flex flex-col items-center justify-center rounded-xl border-2 border-dashed border-slate-300 dark:border-slate-700 bg-surface-light dark:bg-surface-dark/50 px-6 py-10 transition-all hover:border-primary/50 group cursor-pointer">
<div class="mb-4 flex h-16 w-16 items-center justify-center rounded-full bg-slate-100 dark:bg-slate-800 group-hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-slate-400 dark:text-slate-500 group-hover:text-primary transition-colors" style="font-size: 32px;">cloud_upload</span>
</div>
<h3 class="text-center text-base font-semibold text-slate-900 dark:text-white">Upload File</h3>
<p class="mt-1 text-center text-sm text-slate-500 dark:text-slate-400">Tap to upload PDF, DOC, IMG</p>
</div>
<!-- Uploaded File State (Hidden by default, shown for demo structure) -->
<!-- 
            <div class="mt-4 flex items-center gap-4 rounded-xl bg-surface-light dark:bg-surface-dark p-4 shadow-sm border border-slate-200 dark:border-slate-800">
                <div class="flex h-12 w-12 shrink-0 items-center justify-center rounded-lg bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400">
                    <span class="material-symbols-outlined">picture_as_pdf</span>
                </div>
                <div class="flex-1 overflow-hidden">
                    <p class="truncate text-sm font-medium text-slate-900 dark:text-white">project_report_final_v2.pdf</p>
                    <p class="text-xs text-slate-500 dark:text-slate-400">2.4 MB • Uploaded</p>
                </div>
                <button class="text-slate-400 hover:text-red-500 transition-colors">
                    <span class="material-symbols-outlined">delete</span>
                </button>
            </div>
            -->
<div class="mt-8 mb-2">
<h2 class="text-sm font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Print Specifications</h2>
</div>
<!-- Pages Detected -->
<div class="mb-3 flex items-center justify-between rounded-xl bg-surface-light dark:bg-surface-dark p-4 shadow-sm border border-slate-100 dark:border-slate-800/50">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary" style="font-size: 24px;">description</span>
<div>
<p class="text-sm font-medium text-slate-900 dark:text-white">Pages Detected</p>
<p class="text-xs text-slate-500 dark:text-slate-400">Auto-calculated from file</p>
</div>
</div>
<div class="flex items-center gap-3">
<span class="text-base font-bold text-slate-900 dark:text-white">12</span>
<button class="text-xs font-semibold text-primary hover:text-primary/80 px-2 py-1 rounded bg-primary/10 hover:bg-primary/20 transition-colors">
                        Edit
                    </button>
</div>
</div>
<!-- Number of Copies -->
<div class="mb-3 flex items-center justify-between rounded-xl bg-surface-light dark:bg-surface-dark p-4 shadow-sm border border-slate-100 dark:border-slate-800/50">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-slate-400" style="font-size: 24px;">file_copy</span>
<p class="text-sm font-medium text-slate-900 dark:text-white">Number of Copies</p>
</div>
<div class="flex items-center gap-3 rounded-lg bg-slate-100 dark:bg-slate-800/50 p-1">
<button class="flex h-8 w-8 items-center justify-center rounded-md bg-white dark:bg-slate-700 text-slate-900 dark:text-white shadow-sm hover:bg-slate-50 dark:hover:bg-slate-600 transition-all active:scale-95">
<span class="material-symbols-outlined" style="font-size: 18px;">remove</span>
</button>
<input class="w-8 border-none bg-transparent p-0 text-center text-sm font-bold text-slate-900 dark:text-white focus:ring-0" readonly="" type="number" value="1"/>
<button class="flex h-8 w-8 items-center justify-center rounded-md bg-white dark:bg-slate-700 text-slate-900 dark:text-white shadow-sm hover:bg-slate-50 dark:hover:bg-slate-600 transition-all active:scale-95">
<span class="material-symbols-outlined" style="font-size: 18px;">add</span>
</button>
</div>
</div>
<!-- Color vs B&W -->
<div class="mb-3 rounded-xl bg-surface-light dark:bg-surface-dark p-4 shadow-sm border border-slate-100 dark:border-slate-800/50">
<div class="mb-3 flex items-center justify-between">
<p class="text-sm font-medium text-slate-900 dark:text-white">Print Mode</p>
</div>
<div class="flex rounded-lg bg-slate-100 dark:bg-slate-800 p-1">
<label class="group relative flex flex-1 cursor-pointer items-center justify-center rounded-md py-2 text-sm font-medium text-slate-500 transition-all has-[:checked]:bg-white has-[:checked]:text-primary has-[:checked]:shadow-sm dark:has-[:checked]:bg-slate-700 dark:has-[:checked]:text-white">
<input checked="" class="peer sr-only" name="color_mode" type="radio"/>
<span class="z-10 flex items-center gap-2">
<span class="material-symbols-outlined text-base">ink_eraser</span>
                            Black &amp; White
                        </span>
</label>
<label class="group relative flex flex-1 cursor-pointer items-center justify-center rounded-md py-2 text-sm font-medium text-slate-500 transition-all has-[:checked]:bg-white has-[:checked]:text-primary has-[:checked]:shadow-sm dark:has-[:checked]:bg-slate-700 dark:has-[:checked]:text-white">
<input class="peer sr-only" name="color_mode" type="radio"/>
<span class="z-10 flex items-center gap-2">
<span class="material-symbols-outlined text-base">palette</span>
                            Color
                        </span>
</label>
</div>
</div>
<!-- Paper Size & Orientation (Extra useful fields) -->
<div class="mb-3 grid grid-cols-2 gap-3">
<div class="rounded-xl bg-surface-light dark:bg-surface-dark p-4 shadow-sm border border-slate-100 dark:border-slate-800/50">
<p class="mb-2 text-xs font-medium text-slate-500 dark:text-slate-400">Paper Size</p>
<select class="w-full rounded-lg border-slate-200 dark:border-slate-700 bg-transparent py-1.5 text-sm font-medium text-slate-900 dark:text-white focus:border-primary focus:ring-primary">
<option>A4 (Standard)</option>
<option>Letter</option>
<option>Legal</option>
</select>
</div>
<div class="rounded-xl bg-surface-light dark:bg-surface-dark p-4 shadow-sm border border-slate-100 dark:border-slate-800/50">
<p class="mb-2 text-xs font-medium text-slate-500 dark:text-slate-400">Sides</p>
<select class="w-full rounded-lg border-slate-200 dark:border-slate-700 bg-transparent py-1.5 text-sm font-medium text-slate-900 dark:text-white focus:border-primary focus:ring-primary">
<option>Single Sided</option>
<option>Double Sided</option>
</select>
</div>
</div>
<!-- Notes for Seller -->
<div class="mb-6 rounded-xl bg-surface-light dark:bg-surface-dark p-4 shadow-sm border border-slate-100 dark:border-slate-800/50">
<label class="mb-2 block text-sm font-medium text-slate-900 dark:text-white" for="notes">Notes for Seller</label>
<textarea class="block w-full rounded-lg border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/30 p-3 text-sm text-slate-900 dark:text-white placeholder:text-slate-400 focus:border-primary focus:ring-primary resize-none" id="notes" placeholder="e.g., Spiral binding, high quality paper..." rows="3"></textarea>
</div>
</main>
<!-- Fixed Footer -->
<footer class="bg-surface-light dark:bg-surface-dark border-t border-slate-200 dark:border-slate-800 px-6 py-4 pb-8 safe-area-pb">
<div class="mb-4 flex items-center justify-between">
<div class="flex flex-col">
<span class="text-xs text-slate-500 dark:text-slate-400">Total Estimate</span>
<span class="text-xl font-bold text-slate-900 dark:text-white">₹40<span class="text-sm font-normal text-slate-400">.00</span></span>
</div>
<div class="text-right">
<span class="text-xs text-slate-500 dark:text-slate-400 block">12 pages x 1 copy</span>
<span class="text-xs text-green-600 dark:text-green-400 font-medium">Ready in ~15 mins</span>
</div>
</div>
<button class="flex w-full cursor-pointer items-center justify-center rounded-xl bg-primary py-3.5 text-base font-bold text-white shadow-lg shadow-primary/25 hover:bg-primary/90 hover:shadow-primary/40 active:scale-[0.98] transition-all">
                Continue
            </button>
</footer>
</div>
</body></html>
