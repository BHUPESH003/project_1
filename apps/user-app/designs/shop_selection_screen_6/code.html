<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Shop Selection Screen - Empty State</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0d59f2",
                        "background-light": "#f5f6f8",
                        "background-dark": "#101622",
                        "surface-light": "#ffffff",
                        "surface-dark": "#1C2433",
                        "border-light": "#e2e8f0",
                        "border-dark": "#314368",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-white transition-colors duration-200">
<div class="relative flex h-full min-h-screen w-full flex-col overflow-x-hidden max-w-md mx-auto shadow-xl bg-background-light dark:bg-background-dark pb-24">
<header class="sticky top-0 z-20 flex items-center bg-background-light/95 dark:bg-background-dark/95 backdrop-blur-md p-4 pb-2 justify-between border-b border-transparent dark:border-white/5">
<button class="flex size-10 shrink-0 items-center justify-center rounded-full active:bg-slate-200 dark:active:bg-slate-800 transition-colors text-slate-900 dark:text-white">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-10">Nearby Print Shops</h2>
</header>
<div class="sticky top-[60px] z-10 bg-background-light dark:bg-background-dark pt-2 pb-4 opacity-50 pointer-events-none grayscale">
<div class="flex gap-3 px-4 overflow-x-auto no-scrollbar">
<button class="flex h-9 shrink-0 items-center justify-center gap-x-2 rounded-full bg-primary pl-4 pr-4 transition-transform active:scale-95">
<span class="text-white text-sm font-medium leading-normal">Recommended</span>
</button>
<button class="flex h-9 shrink-0 items-center justify-center gap-x-2 rounded-full bg-white dark:bg-surface-dark border border-border-light dark:border-border-dark pl-4 pr-4 transition-transform active:scale-95">
<span class="text-slate-600 dark:text-slate-300 text-sm font-medium leading-normal">Lowest Price</span>
</button>
<button class="flex h-9 shrink-0 items-center justify-center gap-x-2 rounded-full bg-white dark:bg-surface-dark border border-border-light dark:border-border-dark pl-4 pr-4 transition-transform active:scale-95">
<span class="text-slate-600 dark:text-slate-300 text-sm font-medium leading-normal">Fastest</span>
</button>
</div>
</div>
<div class="flex flex-col flex-1 items-center justify-center px-6 pt-10 pb-20">
<div class="w-full max-w-xs bg-white dark:bg-surface-dark rounded-xl shadow-sm border border-border-light dark:border-border-dark p-6 flex flex-col items-center text-center">
<div class="mb-5 flex h-16 w-16 items-center justify-center rounded-full bg-slate-100 dark:bg-slate-800">
<span class="material-symbols-outlined text-4xl text-slate-400 dark:text-slate-500">shopping_cart_off</span>
</div>
<h3 class="text-xl font-bold text-slate-900 dark:text-white mb-2">No Shops Found</h3>
<p class="text-slate-600 dark:text-slate-400 text-sm leading-relaxed mb-6">
                We couldn't find any shops in your area right now. Try changing your search location or check back later.
            </p>
<button class="w-full flex items-center justify-center gap-2 h-12 rounded-lg bg-primary hover:bg-blue-600 text-white font-bold transition-all shadow-md active:scale-[0.98]">
<span class="material-symbols-outlined text-xl">location_on</span>
                Change Location
            </button>
<button class="mt-4 flex items-center justify-center gap-1.5 text-sm font-semibold text-primary dark:text-blue-400 hover:text-blue-700 dark:hover:text-blue-300 transition-colors py-2 px-4 rounded hover:bg-slate-50 dark:hover:bg-white/5">
<span class="material-symbols-outlined text-lg">refresh</span>
                Refresh Results
            </button>
</div>
</div>
</div>

</body></html>
