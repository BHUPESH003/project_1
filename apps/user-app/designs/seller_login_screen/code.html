<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Seller Login - Local Service Provider</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0d59f2",
                        "primary-hover": "#0b4ecf",
                        "background-light": "#f5f6f8",
                        "background-dark": "#101622",
                        "surface-dark": "#182234",
                        "border-dark": "#314368",
                        "text-secondary": "#90a4cb",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased text-white selection:bg-primary selection:text-white">
<!-- Main Container: Simulating a mobile phone view centered on screen -->
<div class="flex min-h-screen items-center justify-center p-4">
<div class="relative w-full max-w-[420px] bg-background-dark shadow-2xl overflow-hidden rounded-2xl border border-border-dark/30">
<!-- Top Bar -->
<div class="flex items-center justify-between p-4 pb-2 bg-background-dark z-10 relative">
<button class="text-white p-2 rounded-full hover:bg-surface-dark transition-colors">
<span class="material-symbols-outlined text-[24px]">arrow_back</span>
</button>
<h2 class="text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-10">Seller Login</h2>
</div>
<!-- Scrollable Content -->
<div class="flex flex-col px-6 pt-6 pb-10">
<!-- Headline -->
<div class="mb-8 text-center">
<h1 class="text-white text-3xl font-bold tracking-tight mb-2">Welcome Back</h1>
<p class="text-text-secondary text-base font-normal leading-normal">
                        Enter your mobile number to access your seller dashboard and manage orders.
                    </p>
</div>
<!-- Phone Input Section -->
<div class="flex flex-col gap-6">
<!-- Mobile Number Field -->
<div class="flex flex-col gap-2">
<label class="text-white text-sm font-medium ml-1">Mobile Number</label>
<div class="flex gap-3">
<!-- Country Code -->
<div class="flex items-center justify-center gap-2 bg-surface-dark border border-border-dark rounded-lg px-3 h-14 min-w-[90px]">
<span class="text-xl">🇮🇳</span>
<span class="text-white font-medium text-base">+91</span>
</div>
<!-- Number Input -->
<div class="flex-1 relative">
<input class="w-full bg-surface-dark border border-border-dark rounded-lg h-14 pl-4 pr-12 text-white text-lg font-medium placeholder:text-text-secondary/50 focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" placeholder="98765 43210" type="tel" value=""/>
<div class="absolute right-4 top-1/2 -translate-y-1/2 text-text-secondary pointer-events-none flex items-center">
<span class="material-symbols-outlined text-[20px]">smartphone</span>
</div>
</div>
</div>
</div>
<!-- Send OTP Button -->
<button class="w-full h-12 bg-primary hover:bg-primary-hover active:scale-[0.98] text-white text-base font-bold rounded-lg shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2">
<span>Send OTP</span>
<span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
<!-- Divider for visual separation of states (Optional/Design Demo) -->
<div class="relative py-4">
<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full border-t border-border-dark/50"></div>
</div>
</div>
<!-- OTP Section (Shown as if appearing after entry) -->
<div class="flex flex-col gap-4 animate-fade-in opacity-90">
<div class="flex justify-between items-end">
<label class="text-white text-sm font-medium ml-1">Enter OTP</label>
<span class="text-primary text-xs font-semibold cursor-pointer hover:underline">Resend in 24s</span>
</div>
<!-- OTP Inputs -->
<div class="flex justify-between gap-2">
<!-- 6 Digit OTP boxes -->
<input class="w-12 h-14 text-center text-xl font-bold bg-surface-dark border border-primary text-white rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" maxlength="1" type="text" value="5"/>
<input class="w-12 h-14 text-center text-xl font-bold bg-surface-dark border border-border-dark text-white rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" maxlength="1" type="text" value=""/>
<input class="w-12 h-14 text-center text-xl font-bold bg-surface-dark border border-border-dark text-white rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" maxlength="1" type="text" value=""/>
<input class="w-12 h-14 text-center text-xl font-bold bg-surface-dark border border-border-dark text-white rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" maxlength="1" type="text" value=""/>
<input class="w-12 h-14 text-center text-xl font-bold bg-surface-dark border border-border-dark text-white rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" maxlength="1" type="text" value=""/>
<input class="w-12 h-14 text-center text-xl font-bold bg-surface-dark border border-border-dark text-white rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" maxlength="1" type="text" value=""/>
</div>
<p class="text-xs text-text-secondary mt-1 text-center">
                            We've sent a code to <span class="text-white font-medium">+91 98765 43210</span>
</p>
</div>
</div>
<!-- Footer Terms -->
<div class="mt-auto pt-12 text-center">
<p class="text-xs text-text-secondary leading-relaxed">
                        By continuing, you agree to our 
                        <a class="text-white hover:text-primary transition-colors underline decoration-border-dark hover:decoration-primary" href="#">Terms of Service</a> 
                        and 
                        <a class="text-white hover:text-primary transition-colors underline decoration-border-dark hover:decoration-primary" href="#">Privacy Policy</a>.
                    </p>
</div>
</div>
<!-- Bottom safe area spacer -->
<div class="h-6 bg-background-dark"></div>
</div>
</div>
</body></html>
