<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Location Permission Onboarding</title>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&amp;family=Noto+Sans:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0d59f2",
                        "background-light": "#f5f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased text-slate-900 dark:text-white transition-colors duration-200">
<div class="relative flex h-screen w-full flex-col overflow-hidden">
<!-- Top Bar -->
<div class="flex items-center p-4 justify-between shrink-0 z-10">
<button class="flex size-12 shrink-0 items-center justify-center rounded-full text-slate-900 dark:text-white hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
</div>
<!-- Main Content Area (Centered) -->
<div class="flex flex-1 flex-col items-center justify-center px-6 -mt-10">
<!-- Icon / Visual -->
<div class="flex flex-col items-center gap-8 mb-8">
<div class="flex items-center justify-center size-24 rounded-full bg-primary/10 dark:bg-primary/20 text-primary">
<span class="material-symbols-outlined text-[48px]">location_on</span>
</div>
<div class="flex max-w-[320px] flex-col items-center gap-3">
<h1 class="text-slate-900 dark:text-white text-2xl font-bold leading-tight tracking-tight text-center">
                        Find shops near you
                    </h1>
<p class="text-slate-500 dark:text-slate-400 text-base font-normal leading-relaxed text-center">
                        LocalCoord needs your location to show available printing shops and estimate delivery times.
                    </p>
</div>
</div>
</div>
<!-- Bottom Actions -->
<div class="flex flex-col gap-3 px-6 pb-8 w-full max-w-[480px] mx-auto shrink-0">
<button class="flex w-full cursor-pointer items-center justify-center overflow-hidden rounded-lg h-12 px-5 bg-primary hover:bg-blue-700 transition-colors text-white text-base font-bold leading-normal tracking-[0.015em] shadow-sm">
<span class="truncate">Allow Location Access</span>
</button>
<button class="flex w-full cursor-pointer items-center justify-center overflow-hidden rounded-lg h-10 px-4 bg-transparent hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors text-slate-700 dark:text-slate-300 text-sm font-bold leading-normal tracking-[0.015em]">
<span class="truncate">Enter Location Manually</span>
</button>
</div>
</div>
</body></html>
