<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Seller Order Inbox</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0d59f2",
                        "background-light": "#f5f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>.no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased">
<div class="relative flex h-full min-h-screen w-full flex-col overflow-x-hidden pb-20">
<div class="sticky top-0 z-10 bg-[#101623] border-b border-[#222f49]">
<div class="flex items-center justify-between p-4">
<div class="flex items-center gap-3">
<button class="text-white flex items-center justify-center rounded-full hover:bg-white/10 p-1 transition-colors">
<span class="material-symbols-outlined text-white" style="font-size: 24px;">arrow_back</span>
</button>
<h2 class="text-white text-xl font-bold leading-tight tracking-[-0.015em]">Inbox (0)</h2>
</div>
<div class="flex items-center gap-2 bg-[#1c2536] py-1 px-3 rounded-full border border-[#2d3a52]">
<div class="h-2 w-2 rounded-full bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.6)]"></div>
<span class="text-white text-sm font-semibold">Online</span>
<span class="material-symbols-outlined text-[#90a4cb] ml-1" style="font-size: 20px;">expand_more</span>
</div>
</div>
</div>
<div class="flex flex-1 flex-col items-center justify-center p-6 text-center">
<div class="mb-6 flex h-32 w-32 items-center justify-center rounded-full bg-[#182234] border border-[#2d3a52] shadow-[0_4px_20px_rgba(0,0,0,0.2)]">
<span class="material-symbols-outlined text-[#5a6b8c]" style="font-size: 64px;">inbox</span>
</div>
<h3 class="text-white text-xl font-bold mb-3 tracking-tight">No active orders right now</h3>
<p class="text-[#90a4cb] text-base font-medium leading-relaxed max-w-[260px]">You’ll see new orders here when you’re Online</p>
</div>
<div class="fixed bottom-0 left-0 right-0 z-50 h-[72px] bg-[#101623] border-t border-[#222f49] px-6 pb-4 pt-2">
<div class="flex items-center justify-between h-full">
<button class="flex flex-col items-center justify-center gap-1 w-16 text-[#90a4cb] hover:text-white transition-colors">
<span class="material-symbols-outlined" style="font-size: 24px;">home</span>
<span class="text-[10px] font-medium">Home</span>
</button>
<button class="flex flex-col items-center justify-center gap-1 w-16 text-primary">
<span class="material-symbols-outlined filled" style="font-size: 24px; font-variation-settings: 'FILL' 1;">inbox</span>
<span class="text-[10px] font-bold">Inbox</span>
</button>
<button class="flex flex-col items-center justify-center gap-1 w-16 text-[#90a4cb] hover:text-white transition-colors">
<span class="material-symbols-outlined" style="font-size: 24px;">receipt_long</span>
<span class="text-[10px] font-medium">Orders</span>
</button>
<button class="flex flex-col items-center justify-center gap-1 w-16 text-[#90a4cb] hover:text-white transition-colors">
<span class="material-symbols-outlined" style="font-size: 24px;">account_circle</span>
<span class="text-[10px] font-medium">Profile</span>
</button>
</div>
</div>
</div>

</body></html>
